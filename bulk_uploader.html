<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Time Bulk Image Uploader</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .bulk-layout { display:grid; grid-template-columns:1.1fr 1fr; gap:14px; }
        .bulk-panel { border:1px solid var(--border-color); border-radius:10px; padding:12px; background:#fff; }
        .bulk-list { max-height:60vh; overflow:auto; display:flex; flex-direction:column; gap:8px; }
        .bulk-item { border:1px solid var(--border-color); border-radius:8px; padding:8px; display:flex; gap:8px; align-items:center; }
        .bulk-item img { width:68px; height:68px; object-fit:cover; border-radius:6px; border:1px solid #ddd; }
        .bulk-item-meta { flex:1; min-width:0; }
        .bulk-item-meta p { margin:0; font-size:0.82rem; color:#666; word-break:break-all; }
        .bulk-toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .bulk-process-row { display:flex; justify-content:flex-end; margin-top:10px; }
        .bulk-process-row .btn { width:auto; }
        .bulk-selected-list { max-height:30vh; overflow:auto; display:flex; flex-direction:column; gap:6px; margin-top:10px; }
        .bulk-selected-chip { border:1px solid var(--border-color); border-radius:8px; padding:6px 8px; font-size:0.82rem; background:#fafafa; }
        .bulk-preview { width:100%; height:420px; object-fit:contain; border:1px solid var(--border-color); border-radius:8px; background:#f8f8f8; display:block; }
        .preview-nav { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:8px; }
        .preview-nav .btn { width:auto; }
        .preview-pos { font-size:0.82rem; color:#666; }
        .status-line { font-size:0.85rem; color:#666; margin:8px 0 0; }
        @media (max-width: 900px) { .bulk-layout { grid-template-columns:1fr; } .bulk-preview { height:320px; } }
    </style>
</head>
<body>
    <div class="container" style="max-width:1100px; margin-top:20px;">
        <header>
            <div class="brand" style="margin-bottom:10px;">
                <span class="material-symbols-outlined brand-icon">upload_file</span>
                <div class="brand-text">
                    <h1>One-Time Bulk Image Uploader</h1>
                    <span class="brand-sub">Select folder → pick images → detect course from first image → upload batch</span>
                </div>
            </div>
        </header>

        <main>
            <div class="form-group">
                <label for="folder-input">Choose Folder</label>
                <input id="folder-input" type="file" accept="image/*" webkitdirectory directory multiple>
            </div>

            <div class="bulk-layout">
                <section class="bulk-panel">
                    <div class="bulk-toolbar">
                        <button id="btn-select-all" class="btn btn-secondary btn-sm" type="button">Select All</button>
                        <button id="btn-clear-all" class="btn btn-secondary btn-sm" type="button">Clear Selection</button>
                        <button id="btn-remove-selected" class="btn btn-secondary btn-sm" type="button">Remove Selected</button>
                    </div>
                    <p id="queue-summary" class="status-line">No images loaded.</p>
                    <div id="bulk-image-list" class="bulk-list"></div>
                    <div class="bulk-process-row">
                        <button id="btn-process-selected" class="btn btn-primary btn-sm" type="button">Process Selected</button>
                    </div>
                </section>

                <section class="bulk-panel">
                    <h3 style="margin-top:0;">Review First Selected Image</h3>
                    <img id="review-image" class="bulk-preview" alt="First selected preview">
                    <div class="preview-nav">
                        <button id="btn-preview-prev" class="btn btn-secondary btn-sm" type="button">Previous</button>
                        <span id="preview-position" class="preview-pos">0 / 0</span>
                        <button id="btn-preview-next" class="btn btn-secondary btn-sm" type="button">Next</button>
                    </div>
                    <p id="review-status" class="status-line">Select images and click Process Selected.</p>
                    <div id="duplicate-warning" class="hidden" style="margin-top:10px;"></div>

                    <div id="review-form" class="hidden" style="margin-top:10px;">
                        <div class="form-group">
                            <label for="review-course">Course (approve or modify)</label>
                            <input id="review-course" type="text" list="review-course-options" placeholder="e.g. CSE2001 - Data Structures">
                            <datalist id="review-course-options"></datalist>
                        </div>

                        <div class="form-group">
                            <label for="review-exam">Exam Type</label>
                            <select id="review-exam">
                                <option value="">Select Exam</option>
                                <option value="Midterm">Mid-term Exam</option>
                                <option value="Term End">Term-End Exam</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="review-slot">Slot (Optional)</label>
                            <input id="review-slot" type="text" placeholder="e.g. A1+TA1">
                        </div>

                        <div class="actions-row">
                            <button id="btn-cancel-review" class="btn btn-secondary btn-flex-1" type="button">Cancel</button>
                            <button id="btn-upload-batch" class="btn btn-primary btn-flex-2" type="button">Upload Selected Batch</button>
                        </div>
                    </div>

                    <h4 style="margin:14px 0 6px;">Selected Batch</h4>
                    <div id="selected-list" class="bulk-selected-list"></div>
                </section>
            </div>

            <div id="global-message"></div>
        </main>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="/static/js/bulk_uploader.js"></script>
</body>
</html>
